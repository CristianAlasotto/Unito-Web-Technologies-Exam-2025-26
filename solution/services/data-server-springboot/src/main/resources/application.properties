spring.application.name=data-server-springboot

# ============================================
# DATABASE CONNECTION - FROM .ENV FILE
# ============================================
# Reads from .env in parent directory via EnvConfig.java
# Your .env uses: SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD

# Version that depend on the .env file existence
spring.datasource.url=${SPRING_DATASOURCE_URL}

# Database URL - reads from SPRING_DATASOURCE_URL
# That's more stable, but restricted if the file .env exist
#spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/anime_db}

# Version that depend on the .env file existence
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Database credentials - reads from SPRING_DATASOURCE_USERNAME and SPRING_DATASOURCE_PASSWORD
# That's more stable, but restricted if the file .env exist
#spring.datasource.username=${SPRING_DATASOURCE_USERNAME:anime_user}
#spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:anime_pass}

# PostgreSQL configuration
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Server port - default 8080
server.port=8080