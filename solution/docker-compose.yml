services:
  postgres:
    image: postgres:16
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anime_user -d anime_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-anime_db}
      POSTGRES_USER: ${POSTGRES_USER:-anime_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-anime_pass}
    ports:
      - "${SPRING_DATASOURCE_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/postgres/init:/docker-entrypoint-initdb.d:ro
      - ./data:/import:ro

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-anime_dynamic}
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
      - ./data:/csvdata:ro

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - postgres

  mongoexpress:
    image: mongo-express:1
    environment:
      ME_CONFIG_MONGODB_SERVER: ${ME_CONFIG_MONGODB_SERVER:-mongo}
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_CONFIG_BASICAUTH_USERNAME:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_CONFIG_BASICAUTH_PASSWORD:-admin}
    ports:
      - "5051:8081"
    depends_on:
      - mongo

  main_server:
    profiles: ["app"]
    build:
      context: ./services/main-server-express
      dockerfile: Dockerfile
    environment:
      MAIN_EXPRESS_PORT: 3000
      DATA_EXPRESS_URL: http://data_express:3001
      DATA_SPRING_URL: http://data_spring:8080
      LOG_HTTP_ENABLED: ${LOG_HTTP_ENABLED:-true}
      LOG_API_ENABLED: ${LOG_API_ENABLED:-true}
    ports:
      - "${MAIN_EXPRESS_PORT:-3000}:3000"
    depends_on:
      data_express:
        condition: service_started
      data_spring:
        condition: service_started

  data_express:
    profiles: ["app"]
    build:
      context: ./services/data-server-mongo
      dockerfile: Dockerfile
    environment:
      DATA_EXPRESS_PORT: 3001
      MONGO_URL: mongodb://mongo:27017/${MONGO_INITDB_DATABASE:-anime_dynamic}
      LOG_API_ENABLED: ${LOG_API_ENABLED:-true}
    ports:
      - "${DATA_EXPRESS_PORT:-3001}:3001"
    depends_on:
      - mongo

  data_spring:
    profiles: ["app"]
    build:
      context: ./services/data-server-springboot
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-anime_db}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-anime_user}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-anime_pass}
    ports:
      - "${DATA_SPRING_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  dozzle:
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:9999:8080"
    restart: unless-stopped

volumes:
  pgdata:
  mongodata:
